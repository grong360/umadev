name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --all-targets --no-fail-fast
      - name: cargo test (doctests)
        run: cargo test --workspace --doc --no-fail-fast

  build-release:
    name: build release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: umadev-linux-x86_64
            ext: ""
          - os: macos-latest
            artifact: umadev-macos-aarch64
            ext: ""
          - os: windows-latest
            artifact: umadev-windows-x86_64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --bin umadev
      # A startup-panic guard: the unit suite never runs the real TUI event loop,
      # so a launch crash (e.g. an eager-evaluated `tokio::select!` branch arg)
      # shipped in 1.0.17/1.0.18 undetected. PTY-launch the built binary and fail
      # if it panics before/at the event loop.
      - name: Launch smoke test (no startup panic)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -uo pipefail
          # A configured backend so the TUI skips the first-run picker and enters
          # the main chat event loop — the exact path that panicked on launch.
          mkdir -p "$HOME/.umadev"
          printf 'backend = "offline"\nlang = "en"\n' > "$HOME/.umadev/config.toml"
          BIN=target/release/umadev
          echo "PTY-launching $BIN to verify it reaches the event loop without panicking..."
          # `script` gives the TUI a PTY; stdin is held open ~6s so it enters and
          # stays in the loop, then EOF -> a clean quit. `timeout` is a hard backstop.
          OUT=$(timeout 25 script -q -e -c "$BIN" /dev/null < <(sleep 6) 2>&1 || true)
          if printf '%s' "$OUT" | grep -qE 'panicked at'; then
            echo "::error::umadev panicked on launch -- a startup crash must never ship"
            printf '%s\n' "$OUT" | tail -60
            exit 1
          fi
          echo "Launch smoke OK: no startup panic."
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/umadev${{ matrix.ext }}
          if-no-files-found: error
